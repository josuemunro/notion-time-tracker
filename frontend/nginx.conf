server {
  listen 80;
  server_name localhost;

  root /usr/share/nginx/html;
  index index.html index.htm;

  # Serve static files directly (CSS, JS, images etc.)
  location ~* \.(?:css|js|jpg|jpeg|gif|png|ico|svg|woff|woff2|ttf|eot|map|webmanifest)$ {
    expires 1y;
    add_header Cache-Control "public";
  }

  # Proxy API requests to the backend service
  location /api/ {
    proxy_pass http://backend:3001/api/;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";

    # Notion sync can take a while with many projects/icons
    proxy_read_timeout 300;
    proxy_send_timeout 300;
    proxy_connect_timeout 60;
  }

  # Serve project icons stored by the backend (^~ prevents regex override)
  location ^~ /assets/icons/ {
    proxy_pass http://backend:3001/assets/icons/;
    proxy_set_header Host $host;
    proxy_cache_valid 200 1h;
  }

  # For all other locations (frontend routes), try files directly
  # and then fall back to index.html for SPA routing by React Router.
  location / {
    try_files $uri $uri/ /index.html;
  }
}